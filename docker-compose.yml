services:
  hy2scale:
    build: .
    image: hy2scale
    container_name: hy2scale
    restart: unless-stopped
    ports:
      - "5565:5565/tcp"
      - "5565:5565/udp"
    volumes:
      - ./configs/${NODE:-local}.yaml:/etc/hy2scale/config.yaml:ro
      - hy2scale-data:/data

volumes:
  hy2scale-data:
