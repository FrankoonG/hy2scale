name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.3.0)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name || github.run_id }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.24"
  BINARY_NAME: hy2scale

jobs:
  # ─── Cross-compile bare binaries ───────────────────────────────
  build-binary:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
            goarm: "7"
          - goos: linux
            goarch: mips64le
          - goos: linux
            goarch: mipsle
            gomips: softfloat

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          GOMIPS: ${{ matrix.gomips }}
        run: |
          SUFFIX="${{ matrix.goos }}-${{ matrix.goarch }}"
          [ -n "${{ matrix.goarm }}" ] && SUFFIX="${SUFFIX}v${{ matrix.goarm }}"
          [ -n "${{ matrix.gomips }}" ] && SUFFIX="${SUFFIX}-${{ matrix.gomips }}"

          OUTPUT="${BINARY_NAME}-${SUFFIX}"
          go build -ldflags="-s -w" -o "${OUTPUT}" ./cmd/node
          tar czf "${OUTPUT}.tar.gz" "${OUTPUT}"

          echo "ASSET=${OUTPUT}.tar.gz" >> $GITHUB_ENV
          echo "ARTIFACT_NAME=${OUTPUT}" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ASSET }}

  # ─── Docker image + iKuai ipkg (amd64) ────────────────────────
  build-docker:
    name: Build Docker image + ipkg
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build frontend
        run: |
          cd web/ui-framework && npm ci && npm run build
          cd ../app && npm ci && npm run build

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Docker image
        run: |
          DOCKER_BUILDKIT=0 docker build -t hy2scale:release .

      - name: Export Docker image
        run: |
          docker save hy2scale:release | gzip > docker-image-amd64.tar.gz
          echo "DOCKER_SIZE=$(du -h docker-image-amd64.tar.gz | cut -f1)" >> $GITHUB_ENV

      - name: Build ipkg
        run: |
          VERSION="${{ steps.ver.outputs.version }}"

          # Update manifest version
          sed -i "s/\"version\": *\"[^\"]*\"/\"version\": \"${VERSION}\"/" ipkg/hy2scale/manifest.json

          # Embed Docker image
          docker save hy2scale:release | gzip > ipkg/hy2scale/docker_image.tar.gz

          # Package ipkg
          cd ipkg
          tar czf "hy2scale-${VERSION}.ipkg" hy2scale/

          # Clean embedded image
          rm -f hy2scale/docker_image.tar.gz

          echo "IPKG_FILE=ipkg/hy2scale-${VERSION}.ipkg" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: docker-image-amd64.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: ipkg
          path: ${{ env.IPKG_FILE }}

  # ─── Create GitHub Release ─────────────────────────────────────
  release:
    name: Create Release
    needs: [build-binary, build-docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release
          find artifacts -name '*.tar.gz' -exec cp {} release/ \;
          find artifacts -name '*.ipkg' -exec cp {} release/ \;
          ls -la release/

      - name: Generate checksums
        working-directory: release
        run: |
          sha256sum * > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: |
            ## hy2scale ${{ steps.version.outputs.tag }}

            ### Binary Downloads

            | Platform | Architecture | File |
            |----------|-------------|------|
            | Linux | amd64 | `hy2scale-linux-amd64.tar.gz` |
            | Linux | arm64 | `hy2scale-linux-arm64.tar.gz` |
            | Linux | armv7 | `hy2scale-linux-armv7.tar.gz` |
            | Linux | mips64le | `hy2scale-linux-mips64le.tar.gz` |
            | Linux | mipsle | `hy2scale-linux-mipsle-softfloat.tar.gz` |

            ### Docker Image

            Offline image (amd64): `docker-image-amd64.tar.gz`
            ```bash
            docker load < docker-image-amd64.tar.gz
            ```

            ### iKuai Package

            `hy2scale-${{ steps.version.outputs.version }}.ipkg` — install via iKuai web UI (高级应用 → 应用市场 → 本地安装)

            ### Verify checksums
            ```
            sha256sum -c checksums-sha256.txt
            ```
          files: |
            release/*
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
