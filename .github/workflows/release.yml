name: Release

on:
  push:
    tags:
      - "[0-9]*"
      - "v[0-9]*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. 1.3.0)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name || github.run_id }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.24"
  BINARY_NAME: hy2scale

jobs:
  # ─── Cross-compile bare binaries ───────────────────────────────
  build-binary:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
            goarm: "7"
          - goos: linux
            goarch: mips64le
          - goos: linux
            goarch: mipsle
            gomips: softfloat

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Frontend MUST be rebuilt fresh and copied into internal/web/static/
      # before `go build` runs — the binary uses `go:embed internal/web/static`
      # so a stale committed bundle silently ships outdated UI even when
      # NodesGraphView.tsx etc. are correctly updated in source. The
      # build-docker job already does this via Dockerfile; build-binary used
      # to skip it, which made every release bare-binary tarball ship the
      # last-committed dist instead of the post-checkout source. Mirror
      # build-docker's frontend step here so the two artifacts stay in sync.
      - name: Build frontend
        run: |
          set -euxo pipefail
          (cd web/ui-framework && npm ci && npm run build)
          (cd web/app && npm ci && npm run build)
          rm -rf internal/web/static
          mkdir -p internal/web/static
          cp -r web/app/dist/. internal/web/static/
          ls -la internal/web/static/assets/
        working-directory: ${{ github.workspace }}

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          GOMIPS: ${{ matrix.gomips }}
        run: |
          SUFFIX="${{ matrix.goos }}-${{ matrix.goarch }}"
          [ -n "${{ matrix.goarm }}" ] && SUFFIX="${SUFFIX}v${{ matrix.goarm }}"
          [ -n "${{ matrix.gomips }}" ] && SUFFIX="${SUFFIX}-${{ matrix.gomips }}"

          OUTPUT="${BINARY_NAME}-${SUFFIX}"
          go build -ldflags="-s -w" -o "${OUTPUT}" ./cmd/node
          tar czf "${OUTPUT}.tar.gz" "${OUTPUT}"

          echo "ASSET=${OUTPUT}.tar.gz" >> $GITHUB_ENV
          echo "ARTIFACT_NAME=${OUTPUT}" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ASSET }}

  # ─── Docker image + iKuai ipkg (per-arch) ─────────────────────
  # Matrix builds amd64 + arm64 in parallel, each emitting:
  #   docker-image-{arch}.tar.gz   (offline-loadable image)
  #   hy2scale-{version}-{arch}.ipkg  (iKuai package with image embedded)
  # Both archs run on amd64 GitHub runners; arm64 uses QEMU emulation
  # via docker buildx. The ipkg's manifest.json `image: hy2scale:ikuai`
  # tag is the same name on both archs so iKuai's bootstrap script does
  # not need per-arch logic — it just `docker load`s the per-arch tarball
  # the user installed and the embedded image runs natively.
  build-docker:
    name: Build Docker + ipkg (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # amd64 → x86 in user-facing ipkg filename (matches iKuai router
          # CPU labels). Native amd64 runner.
          - arch: amd64
            arch_label: x86
            platform: linux/amd64
            runner: ubuntu-latest
          # arm64 native runner (ubuntu-24.04-arm) — avoids QEMU emulation
          # of strongswan + iptables source compiles, cuts the arm64 leg
          # from ~13min to ~3min.
          - arch: arm64
            arch_label: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build frontend
        run: |
          cd web/ui-framework && npm ci && npm run build
          cd ../app && npm ci && npm run build

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Docker image (${{ matrix.platform }})
        run: |
          # buildx --load brings the built image into the local docker
          # daemon so subsequent `docker save` works the same way the
          # legacy single-arch path did. Both runners are native to
          # their target arch (amd64 on ubuntu-latest, arm64 on
          # ubuntu-24.04-arm), so the build is fast and --load is the
          # natural endpoint. Tags: frankoong/hy2scale:<version> (the
          # name users see when `docker load`-ing the tarball) and
          # hy2scale:ikuai (the local tag the ipkg bootstrap expects).
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --tag frankoong/hy2scale:${{ steps.ver.outputs.version }} \
            --tag hy2scale:ikuai \
            --load \
            .

      - name: Export Docker image
        run: |
          docker save frankoong/hy2scale:${{ steps.ver.outputs.version }} \
            | gzip > docker-image-${{ matrix.arch }}.tar.gz
          echo "DOCKER_SIZE=$(du -h docker-image-${{ matrix.arch }}.tar.gz | cut -f1)" >> $GITHUB_ENV

      - name: Build ipkg
        run: |
          # ipkg version must be plain X.Y.Z (iKuai's parser rejects suffixes
          # like -rc1). Read from Go source then strip any prerelease suffix
          # so the manifest stays installable even on rc-tagged releases.
          RAW_VERSION=$(grep 'const Version' internal/api/server.go | sed 's/.*"\(.*\)".*/\1/')
          IPKG_VERSION=$(echo "$RAW_VERSION" | sed 's/-.*//')
          echo "Source Version: ${RAW_VERSION} -> ipkg manifest: ${IPKG_VERSION}"

          # The release-asset filename uses the FULL tag (with -rc1 suffix
          # if present) so users can tell candidate builds apart, but the
          # internal manifest version stays plain X.Y.Z.
          ASSET_VERSION="${{ steps.ver.outputs.version }}"

          # Update manifest version (in-tree, not committed)
          sed -i "s/\"version\": *\"[^\"]*\"/\"version\": \"${IPKG_VERSION}\"/" ipkg/hy2scale/manifest.json

          # Embed Docker image (iKuai bootstrap expects hy2scale:ikuai tag).
          docker save hy2scale:ikuai | gzip > ipkg/hy2scale/docker_image.tar.gz

          # Package ipkg. Filename: hy2scale-<arch>-<version>.ipkg
          # (arch first, then version) so installers visually parse the
          # arch immediately and don't mistake a version-suffix for one.
          # arch_label uses iKuai's CPU naming convention: "x86" for
          # amd64 routers, "arm64" for aarch64 routers.
          cd ipkg
          tar czf "hy2scale-${{ matrix.arch_label }}-${ASSET_VERSION}.ipkg" hy2scale/

          # Clean embedded image
          rm -f hy2scale/docker_image.tar.gz

          echo "IPKG_FILE=ipkg/hy2scale-${{ matrix.arch_label }}-${ASSET_VERSION}.ipkg" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ matrix.arch }}
          path: docker-image-${{ matrix.arch }}.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: ipkg-${{ matrix.arch }}
          path: ${{ env.IPKG_FILE }}

  # ─── Create GitHub Release ─────────────────────────────────────
  release:
    name: Create Release
    needs: [build-binary, build-docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          # Find the most recent tag strictly before this one. When the
          # workflow is triggered by a tag push, HEAD == TAG, so HEAD^
          # skips past the tag commit itself.
          PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)

          if [ -n "${PREV}" ]; then
            RANGE="${PREV}..HEAD"
            HEADER="Changelog since ${PREV}"
          else
            RANGE=""
            HEADER="Full commit history"
          fi
          echo "Previous tag: ${PREV:-<none>}"
          echo "Range: ${RANGE:-<full history>}"

          {
            echo "header=${HEADER}"
            echo "changelog<<CHANGELOG_EOF"
            if [ -z "${RANGE}" ]; then
              git log --pretty=format:"- %s (%h)" --no-merges
            else
              git log "${RANGE}" --pretty=format:"- %s (%h)" --no-merges
            fi
            echo ""
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release
          find artifacts -name '*.tar.gz' -exec cp {} release/ \;
          find artifacts -name '*.ipkg' -exec cp {} release/ \;
          ls -la release/

      - name: Generate checksums
        working-directory: release
        run: |
          sha256sum * > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: |
            ## hy2scale ${{ steps.version.outputs.tag }}

            ### Binary Downloads

            | Platform | Architecture | File |
            |----------|-------------|------|
            | Linux | amd64 | `hy2scale-linux-amd64.tar.gz` |
            | Linux | arm64 | `hy2scale-linux-arm64.tar.gz` |
            | Linux | armv7 | `hy2scale-linux-armv7.tar.gz` |
            | Linux | mips64le | `hy2scale-linux-mips64le.tar.gz` |
            | Linux | mipsle | `hy2scale-linux-mipsle-softfloat.tar.gz` |

            ### Docker Image

            Pull from Docker Hub (multi-arch manifest, amd64 + arm64):
            ```bash
            docker pull frankoong/hy2scale:${{ steps.version.outputs.version }}
            ```

            Or load offline (one per arch — useful for air-gapped hosts):
            ```bash
            # amd64 (x86_64)
            docker load < docker-image-amd64.tar.gz
            # arm64 (aarch64)
            docker load < docker-image-arm64.tar.gz
            ```

            ### iKuai Package

            Pick the package matching your iKuai router's CPU architecture:
            - `hy2scale-x86-${{ steps.version.outputs.version }}.ipkg` — for x86 / x86_64 iKuai
            - `hy2scale-arm64-${{ steps.version.outputs.version }}.ipkg` — for arm64 / aarch64 iKuai

            Install via the iKuai web UI (Advanced Apps → App Market → Local Install).

            ### Verify checksums
            ```
            sha256sum -c checksums-sha256.txt
            ```

            <details>
            <summary>${{ steps.changelog.outputs.header }}</summary>

            ${{ steps.changelog.outputs.changelog }}

            </details>
          files: |
            release/*
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Push multi-arch image to Docker Hub ─────────────────────
  # Independent of build-docker (which produces offline tarballs +
  # ipkg). This job does a fresh buildx build with --push so a single
  # multi-arch manifest lands on Hub. amd64 builds native; arm64 uses
  # QEMU emulation registered by docker/setup-qemu-action.
  #
  # Auth: DOCKERHUB_USERNAME + DOCKERHUB_TOKEN repo secrets. Use a
  # Docker Hub access token (Read+Write+Delete), never the account
  # password. Token is masked in logs by GitHub Actions.
  publish-dockerhub:
    name: Push frankoong/hy2scale to Docker Hub
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version + tags
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VER="${TAG#v}"
          TAGS="frankoong/hy2scale:${VER}"
          # Stamp :latest only on a finalised tag (no -rc / -dev / etc.).
          case "$VER" in
            *-*) ;;
            *)   TAGS="${TAGS},frankoong/hy2scale:latest" ;;
          esac
          echo "version=${VER}" >> $GITHUB_OUTPUT
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
          echo "Pushing tags: ${TAGS}"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (linux/amd64 + linux/arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.ver.outputs.tags }}
          # Skip provenance/SBOM attachments — they create extra
          # sha-only artifacts on Hub that clutter the tag list.
          provenance: false
