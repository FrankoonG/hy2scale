name: Release

on:
  push:
    tags:
      - "[0-9]*"
      - "v[0-9]*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. 1.3.0)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name || github.run_id }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.24"
  BINARY_NAME: hy2scale

jobs:
  # ─── Cross-compile bare binaries ───────────────────────────────
  build-binary:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
            goarm: "7"
          - goos: linux
            goarch: mips64le
          - goos: linux
            goarch: mipsle
            gomips: softfloat

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Frontend MUST be rebuilt fresh and copied into internal/web/static/
      # before `go build` runs — the binary uses `go:embed internal/web/static`
      # so a stale committed bundle silently ships outdated UI even when
      # NodesGraphView.tsx etc. are correctly updated in source. The
      # build-docker job already does this via Dockerfile; build-binary used
      # to skip it, which made every release bare-binary tarball ship the
      # last-committed dist instead of the post-checkout source. Mirror
      # build-docker's frontend step here so the two artifacts stay in sync.
      - name: Build frontend
        run: |
          set -euxo pipefail
          (cd web/ui-framework && npm ci && npm run build)
          (cd web/app && npm ci && npm run build)
          rm -rf internal/web/static
          mkdir -p internal/web/static
          cp -r web/app/dist/. internal/web/static/
          ls -la internal/web/static/assets/
        working-directory: ${{ github.workspace }}

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          GOMIPS: ${{ matrix.gomips }}
        run: |
          SUFFIX="${{ matrix.goos }}-${{ matrix.goarch }}"
          [ -n "${{ matrix.goarm }}" ] && SUFFIX="${SUFFIX}v${{ matrix.goarm }}"
          [ -n "${{ matrix.gomips }}" ] && SUFFIX="${SUFFIX}-${{ matrix.gomips }}"

          OUTPUT="${BINARY_NAME}-${SUFFIX}"
          go build -ldflags="-s -w" -o "${OUTPUT}" ./cmd/node
          tar czf "${OUTPUT}.tar.gz" "${OUTPUT}"

          echo "ASSET=${OUTPUT}.tar.gz" >> $GITHUB_ENV
          echo "ARTIFACT_NAME=${OUTPUT}" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ASSET }}

  # ─── Docker image + iKuai ipkg (amd64) ────────────────────────
  build-docker:
    name: Build Docker image + ipkg
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build frontend
        run: |
          cd web/ui-framework && npm ci && npm run build
          cd ../app && npm ci && npm run build

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Docker image
        run: |
          # Tag the built image with the same name users get from Docker
          # Hub (frankoong/hy2scale:<version>) so `docker load < tarball`
          # lands under the expected name, avoiding a rename step before
          # `docker run`. The local `hy2scale:ikuai` alias is kept so the
          # ipkg script below and any other consumer that assumed that
          # name keep working.
          DOCKER_BUILDKIT=0 docker build \
            -t frankoong/hy2scale:${{ steps.ver.outputs.version }} \
            -t hy2scale:ikuai .

      - name: Export Docker image
        run: |
          docker save frankoong/hy2scale:${{ steps.ver.outputs.version }} \
            | gzip > docker-image-amd64.tar.gz
          echo "DOCKER_SIZE=$(du -h docker-image-amd64.tar.gz | cut -f1)" >> $GITHUB_ENV

      - name: Build ipkg
        run: |
          # ipkg version must be X.Y.Z (no rc/beta suffix) — read from Go source
          IPKG_VERSION=$(grep 'const Version' internal/api/server.go | sed 's/.*"\(.*\)".*/\1/')
          echo "ipkg version: ${IPKG_VERSION}"

          # Update manifest version
          sed -i "s/\"version\": *\"[^\"]*\"/\"version\": \"${IPKG_VERSION}\"/" ipkg/hy2scale/manifest.json

          # Embed Docker image (iKuai bootstrap expects hy2scale:ikuai tag).
          docker save hy2scale:ikuai | gzip > ipkg/hy2scale/docker_image.tar.gz

          # Package ipkg
          cd ipkg
          tar czf "hy2scale-${IPKG_VERSION}.ipkg" hy2scale/

          # Clean embedded image
          rm -f hy2scale/docker_image.tar.gz

          echo "IPKG_FILE=ipkg/hy2scale-${IPKG_VERSION}.ipkg" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: docker-image-amd64.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: ipkg
          path: ${{ env.IPKG_FILE }}

  # ─── Create GitHub Release ─────────────────────────────────────
  release:
    name: Create Release
    needs: [build-binary, build-docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          # Find the most recent tag strictly before this one. When the
          # workflow is triggered by a tag push, HEAD == TAG, so HEAD^
          # skips past the tag commit itself.
          PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)

          if [ -n "${PREV}" ]; then
            RANGE="${PREV}..HEAD"
            HEADER="Changelog since ${PREV}"
          else
            RANGE=""
            HEADER="Full commit history"
          fi
          echo "Previous tag: ${PREV:-<none>}"
          echo "Range: ${RANGE:-<full history>}"

          {
            echo "header=${HEADER}"
            echo "changelog<<CHANGELOG_EOF"
            if [ -z "${RANGE}" ]; then
              git log --pretty=format:"- %s (%h)" --no-merges
            else
              git log "${RANGE}" --pretty=format:"- %s (%h)" --no-merges
            fi
            echo ""
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release
          find artifacts -name '*.tar.gz' -exec cp {} release/ \;
          find artifacts -name '*.ipkg' -exec cp {} release/ \;
          ls -la release/

      - name: Generate checksums
        working-directory: release
        run: |
          sha256sum * > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: |
            ## hy2scale ${{ steps.version.outputs.tag }}

            ### Binary Downloads

            | Platform | Architecture | File |
            |----------|-------------|------|
            | Linux | amd64 | `hy2scale-linux-amd64.tar.gz` |
            | Linux | arm64 | `hy2scale-linux-arm64.tar.gz` |
            | Linux | armv7 | `hy2scale-linux-armv7.tar.gz` |
            | Linux | mips64le | `hy2scale-linux-mips64le.tar.gz` |
            | Linux | mipsle | `hy2scale-linux-mipsle-softfloat.tar.gz` |

            ### Docker Image

            Offline image (amd64): `docker-image-amd64.tar.gz`
            ```bash
            docker load < docker-image-amd64.tar.gz
            ```

            ### iKuai Package

            `hy2scale-${{ steps.version.outputs.version }}.ipkg` — install via the iKuai web UI (Advanced Apps → App Market → Local Install).

            ### Verify checksums
            ```
            sha256sum -c checksums-sha256.txt
            ```

            <details>
            <summary>${{ steps.changelog.outputs.header }}</summary>

            ${{ steps.changelog.outputs.changelog }}

            </details>
          files: |
            release/*
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
